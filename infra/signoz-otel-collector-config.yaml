receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
    send_batch_max_size: 2000
  memory_limiter:
    check_interval: 5s
    limit_mib: 500
    spike_limit_mib: 100
  resourcedetection:
    detectors: [env]
    timeout: 5s
    override: false

exporters:
  clickhousetraces:
    datasource: tcp://default:signoz@clickhouse:9000
    timeout: 60s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [clickhousetraces]
